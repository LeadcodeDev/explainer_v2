name: Deploy Blog

on:
  push:
    branches: [main]
    paths:
      - 'apps/blog/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

env:
  DEPLOY_TARGET: '' # Set to 'vercel', 'cloudflare', 'github-pages', or leave empty to skip

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @explainer/blog build

      - uses: actions/upload-artifact@v4
        with:
          name: blog-dist
          path: apps/blog/dist/

  deploy-vercel:
    needs: build
    if: env.DEPLOY_TARGET == 'vercel'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @explainer/blog build
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_BLOG_PROJECT_ID }}
          working-directory: apps/blog
          vercel-args: '--prod'

  deploy-cloudflare:
    needs: build
    if: env.DEPLOY_TARGET == 'cloudflare'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: blog-dist
          path: dist
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=explainer-blog

  deploy-github-pages:
    needs: build
    if: env.DEPLOY_TARGET == 'github-pages'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages-blog
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: blog-dist
          path: dist
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
